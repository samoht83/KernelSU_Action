name: OnePlus Nord N200 Kernel Compiler

on:
  workflow_dispatch:

jobs:
  compile-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: System Pre-flight & Dependency Setup
        run: |
          # Free up disk space on GitHub runner before installing
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache device-tree-compiler flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev lib32stdc++6 libelf-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache/heroku /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/stack /opt/hostedtoolcache/go /usr/local/share/boost
          df -h /

      - name: Fetch Kernel Source Tree
        run: |
          git clone --depth=1 https://github.com/samoht83/android_kernel_oneplus_sm4350.git -b lineage-22.2 kernel-source

      - name: Fetch AOSP Clang Toolchain
        run: |
          mkdir -p aosp-clang
          curl -L --retry 5 "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master-kernel-build-2022/clang-r450784e.tar.gz" | tar -C aosp-clang -xzf -
          ls -la aosp-clang/bin/

      - name: Fetch AOSP GCC Binaries
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b android-12.1.0_r27 gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android-12.1.0_r27 gcc32

      - name: Prepare KernelSU Integration
        run: |
          cd kernel-source
          # KernelSU 1.0+ is GKI-only; the holi/SM4350 kernel is non-GKI (~4.19),
          # so pin to the last non-GKI-supporting release (v0.9.5)
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s -- v0.9.5

          # Locate the defconfig (n200_defconfig may be in arch/arm64/configs/ directly
          # or in arch/arm64/configs/vendor/)
          if [ -f arch/arm64/configs/n200_defconfig ]; then
            DEFCONFIG=arch/arm64/configs/n200_defconfig
          elif [ -f arch/arm64/configs/vendor/n200_defconfig ]; then
            DEFCONFIG=arch/arm64/configs/vendor/n200_defconfig
          else
            DEFCONFIG=arch/arm64/configs/vendor/holi-perf_defconfig
          fi
          echo "Patching defconfig: $DEFCONFIG"

          # Enable KernelSU + kprobe backend + suppress -Werror
          {
            echo ""
            echo "# KernelSU (non-GKI, v0.9.5)"
            echo "CONFIG_KSU=y"
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_HAVE_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_MODULES=y"
            echo "CONFIG_CC_WERROR=n"
          } >> "$DEFCONFIG"

      - name: Apply Build Fixes
        run: |
          cd kernel-source

          # ----- Fix 1: WALT tracepoint undefined references -----
          # The WALT tracepoints (__tracepoint_sched_update_task_ravg, etc.) need
          # CREATE_TRACE_POINTS defined before including the trace header in one .c file.
          # If trace.c exists but lacks the define, prepend it; if missing, create it.
          if [ -f kernel/sched/walt/trace.c ]; then
            if ! grep -q "CREATE_TRACE_POINTS" kernel/sched/walt/trace.c; then
              echo "Patching kernel/sched/walt/trace.c with CREATE_TRACE_POINTS"
              sed -i '1i#define CREATE_TRACE_POINTS' kernel/sched/walt/trace.c
            fi
          else
            echo "Creating kernel/sched/walt/trace.c with CREATE_TRACE_POINTS"
            mkdir -p kernel/sched/walt
            cat > kernel/sched/walt/trace.c << 'EOF'
#define CREATE_TRACE_POINTS
#include "trace.h"
EOF
          fi

          # ----- Fix 2: KernelSU hook undefined references -----
          # Ensure drivers/kernelsu/Makefile compiles all the core hook files.
          # v0.9.5 sometimes omits core_hook.o on certain kernel trees.
          if [ -f drivers/kernelsu/Makefile ]; then
            for obj in core_hook ksu manager allowlist; do
              if ! grep -q "${obj}.o" drivers/kernelsu/Makefile; then
                echo "Adding obj-y += ${obj}.o to drivers/kernelsu/Makefile"
                echo "obj-y += ${obj}.o" >> drivers/kernelsu/Makefile
              fi
            done
          fi

          # Also add -fno-pic to KernelSU compilation flags to avoid PIE/relocation
          # mismatches with the GCC linker at final vmlinux link stage.
          if ! grep -q "ccflags-y" drivers/kernelsu/Makefile; then
            echo "ccflags-y += -fno-pic" >> drivers/kernelsu/Makefile
          fi

          # ----- Fix 3: rc80211_minstrel_exit -----
          # Revert any accidental const-qualification of mcs_groups arrays that
          # could break section placement and symbol export of module init/exit.
          for f in net/wireless/ath/ath9k/rc.c net/mac80211/rc80211_minstrel_ht.c; do
            if [ -f "$f" ] && grep -q "const struct minstrel_mcs_groups" "$f" 2>/dev/null; then
              echo "Reverting const struct minstrel_mcs_groups in $f"
              sed -i 's/const struct minstrel_mcs_groups/struct minstrel_mcs_groups/g' "$f"
            fi
          done

      - name: Configure Ccache
        run: |
          mkdir -p .ccache
          echo "max_size = 2G" > .ccache/ccache.conf

      - name: Execute Kernel Compilation Pipeline
        run: |
          cd kernel-source

          export PATH="${{ github.workspace }}/aosp-clang/bin:${{ github.workspace }}/gcc64/bin:${{ github.workspace }}/gcc32/bin:$PATH"

          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-

          # Ccache
          export CCACHE_DIR="${{ github.workspace }}/.ccache"
          export CCACHE_COMPILERCHECK=content
          export USE_CCACHE=1

          # Detect defconfig (allow fallback)
          if [ -f arch/arm64/configs/n200_defconfig ]; then
            DEFCONFIG=n200_defconfig
          elif [ -f arch/arm64/configs/vendor/n200_defconfig ]; then
            DEFCONFIG=vendor/n200_defconfig
          elif [ -f arch/arm64/configs/vendor/holi-perf_defconfig ]; then
            DEFCONFIG=vendor/holi-perf_defconfig
          else
            echo "ERROR: no defconfig found" >&2
            exit 1
          fi
          echo "Using defconfig: $DEFCONFIG"

          make O=out "$DEFCONFIG"

          # Validate KernelSU is enabled in .config
          grep -E "CONFIG_KSU|CONFIG_KPROBES" out/.config

          make -j$(nproc --all) O=out 2>&1 | tee build.log

      - name: Verify and Package Build Artifacts
        run: |
          mkdir -p output
          if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb output/
          elif [ -f kernel-source/out/arch/arm64/boot/Image ]; then
            cp kernel-source/out/arch/arm64/boot/Image output/
          fi
          ls -lh output/

      - name: Upload Finished Kernel Binary
        uses: actions/upload-artifact@v4
        with:
          name: Nord-N200-Kernel-Image
          path: output/*
